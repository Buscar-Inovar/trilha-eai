    // Audio synthesizer helper
    class SoundFX {
      static ctx = null;

      static init() {
        if (!this.ctx) {
          const AudioCtx = window.AudioContext || window.webkitAudioContext;
          if (AudioCtx) this.ctx = new AudioCtx();
        }
      }

      static playTone(freq, type = 'sine', duration = 0.15, gainVal = 0.1) {
        try {
          this.init();
          if (!this.ctx) return;
          if (this.ctx.state === 'suspended') {
            this.ctx.resume();
          }
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = type;
          osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
          gain.gain.setValueAtTime(gainVal, this.ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + duration);
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.start();
          osc.stop(this.ctx.currentTime + duration);
        } catch (e) {}
      }

      static playSuccess() {
        this.playTone(523.25, 'sine', 0.1, 0.1);
        setTimeout(() => this.playTone(659.25, 'sine', 0.15, 0.12), 100);
        setTimeout(() => this.playTone(783.99, 'sine', 0.2, 0.15), 200);
      }

      static playError() {
        this.playTone(220, 'triangle', 0.15, 0.12);
        setTimeout(() => this.playTone(180, 'triangle', 0.25, 0.12), 120);
      }

      static playClick() {
        this.playTone(400, 'sine', 0.05, 0.05);
      }

      static playVictory() {
        const notes = [523.25, 659.25, 783.99, 1046.50];
        notes.forEach((freq, index) => {
          setTimeout(() => this.playTone(freq, 'triangle', 0.25, 0.15), index * 120);
        });
      }
    }

    function shuffleArray(arr) {
      const array = [...arr];
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    const { useState, useEffect } = React;

    function App() {
      const [screen, setScreen] = useState('welcome');
      const [gameMode, setGameMode] = useState('individual');
      const [teamName, setTeamName] = useState('');
      const [soundEnabled, setSoundEnabled] = useState(false);
      const [score, setScore] = useState(0);
      const [completedPhases, setCompletedPhases] = useState([false, false, false, false, false]);
      const [currentPhaseNumber, setCurrentPhaseNumber] = useState(1);

      // Phase 1 State
      const [p1Deck, setP1Deck] = useState([]);
      const [p1Index, setP1Index] = useState(0);
      const [p1Answered, setP1Answered] = useState(false);
      const [p1Feedback, setP1Feedback] = useState(null);

      // Phase 2 State

      const [p2Index, setP2Index] = useState(0);
      const [p2Options, setP2Options] = useState([]);

      const [p2Feedback, setP2Feedback] = useState(null);

      // Phase 3 State
      const [p3Scenarios, setP3Scenarios] = useState([]);
      const [p3Index, setP3Index] = useState(0);
      const [p3Answered, setP3Answered] = useState(false);

      // Phase 4 State
      const [p4Items, setP4Items] = useState([]);
      const [p4Attempt, setP4Attempt] = useState(1);
      const [p4Checked, setP4Checked] = useState(false);
      const [p4IsCorrect, setP4IsCorrect] = useState(false);
      const [p4Feedback, setP4Feedback] = useState(null);

      // Phase 5 State
      const [p5Questions, setP5Questions] = useState([]);
      const [p5Index, setP5Index] = useState(0);
      const [p5Answered, setP5Answered] = useState(false);
      const [p5Feedback, setP5Feedback] = useState(null);

      useEffect(() => {
        const saved = localStorage.getItem('TRILHA_EAI_STATE');
        if (saved) {
          try {
            const data = JSON.parse(saved);
            if (data.score !== undefined) setScore(data.score);
            if (data.completedPhases) setCompletedPhases(data.completedPhases);
            if (data.gameMode) setGameMode(data.gameMode);
            if (data.teamName) setTeamName(data.teamName);
            if (data.currentPhaseNumber) setCurrentPhaseNumber(data.currentPhaseNumber);
          } catch (e) {}
        }
      }, []);

      useEffect(() => {
        const stateToSave = {
          score,
          completedPhases,
          gameMode,
          teamName,
          currentPhaseNumber
        };
        localStorage.setItem('TRILHA_EAI_STATE', JSON.stringify(stateToSave));
      }, [score, completedPhases, gameMode, teamName, currentPhaseNumber]);

      const triggerSound = (type) => {
        if (!soundEnabled) return;
        if (type === 'success') SoundFX.playSuccess();
        else if (type === 'error') SoundFX.playError();
        else if (type === 'click') SoundFX.playClick();
        else if (type === 'victory') SoundFX.playVictory();
      };

      const startPhase1 = () => {
        const allItems = [...PEDAGOGY_DATA.sections, ...PEDAGOGY_DATA.boxes];
        const shuffled = shuffleArray(allItems);
        setP1Deck(shuffled);
        setP1Index(0);
        setP1Answered(false);
        setP1Feedback(null);
        setScreen('phase1');
        setCurrentPhaseNumber(1);
      };

      const startPhase2 = () => {
        const allItems = [...PEDAGOGY_DATA.sections, ...PEDAGOGY_DATA.boxes];
        const selected = shuffleArray(allItems).slice(0, 6);
        setP2Items(selected);
        setP2Index(0);
        setP2Answered(false);
        setP2Feedback(null);
        setupPhase2Options(selected[0], allItems);
        setScreen('phase2');
        setCurrentPhaseNumber(2);
      };

      const setupPhase2Options = (currentItem, allItems) => {
        if (!currentItem) return;
        const correctOpt = currentItem.purpose;
        const others = allItems.filter(i => i.id !== currentItem.id);
        const wrongOpts = shuffleArray(others).slice(0, 2).map(i => i.purpose);
        const options = shuffleArray([correctOpt, ...wrongOpts]);
        setP2Options(options);
      };

      const startPhase3 = () => {
        const selectedScenarios = shuffleArray(PEDAGOGY_DATA.scenarios).slice(0, 5);
        const prepared = selectedScenarios.map(scen => ({
          ...scen,
          shuffledOptions: shuffleArray(scen.options)
        }));
        setP3Scenarios(prepared);
        setP3Index(0);
        setP3Answered(false);
        setP3Feedback(null);
        setScreen('phase3');
        setCurrentPhaseNumber(3);
      };

      const startPhase4 = () => {
        const shuffledSecs = shuffleArray(PEDAGOGY_DATA.sections);
        setP4Items(shuffledSecs);
        setP4Attempt(1);
        setP4Checked(false);
        setP4IsCorrect(false);
        setP4Feedback(null);
        setScreen('phase4');
        setCurrentPhaseNumber(4);
      };

      const startPhase5 = () => {
        const preparedQuestions = PEDAGOGY_DATA.finalChallenges.map(q => ({
          ...q,
          shuffledOptions: shuffleArray(q.options)
        }));
        setP5Questions(shuffleArray(preparedQuestions));
        setP5Index(0);
        setP5Answered(false);
        setP5Feedback(null);
        setScreen('phase5');
        setCurrentPhaseNumber(5);
      };

      const resetAllProgress = () => {
        setScore(0);
        setCompletedPhases([false, false, false, false, false]);
        setCurrentPhaseNumber(1);
        localStorage.removeItem('TRILHA_EAI_STATE');
        setScreen('welcome');
        triggerSound('click');
      };

      const maxPossibleScore = 60 + 60 + 50 + 40 + 60; // 270 pts
      const scorePercentage = Math.min(100, Math.round((score / maxPossibleScore) * 100));

      const handleP1Answer = (selectedType) => {
        if (p1Answered) return;
        const currentCard = p1Deck[p1Index];
        const isCorrect = currentCard.type === selectedType;

        setP1Answered(true);

        if (isCorrect) {
          setScore(prev => prev + 5);
          triggerSound('success');
          setP1Feedback({
            correct: true,
            message: currentCard.type === 'SEÇÃO'
              ? 'Correto! Este elemento é uma Seção e participa da organização do percurso pedagógico do capítulo.'
              : 'Correto! Este elemento é um Box e oferece um apoio, aprofundamento ou provocação específica dentro do percurso.'
          });
        } else {
          triggerSound('error');
          setP1Feedback({
            correct: false,
            message: `Ops! Resposta incorreta (0 pontos). O elemento "${currentCard.name}" é na verdade um(a) ${currentCard.type}.`
          });
        }
      };

      const nextP1Card = () => {
        triggerSound('click');
        if (p1Index < p1Deck.length - 1) {
          setP1Index(prev => prev + 1);
          setP1Answered(false);
          setP1Feedback(null);
        } else {
          const updated = [...completedPhases];
          updated[0] = true;
          setCompletedPhases(updated);
          setScreen('map');
          if (soundEnabled) confetti();
        }
      };

      const handleP2Answer = (selectedPurpose) => {
        if (p2Answered) return;
        const currentItem = p2Items[p2Index];
        const isCorrect = selectedPurpose === currentItem.purpose;

        setP2Answered(true);

        if (isCorrect) {
          setScore(prev => prev + 10);
          triggerSound('success');
          setP2Feedback({
            correct: true,
            message: `Correto! (+10 pontos)\n\n${currentItem.purpose}`,
            keywords: currentItem.keywords
          });
        } else {
          triggerSound('error');
          setP2Feedback({
            correct: false,
            message: `Resposta incorreta (0 pontos).\n\nA opção correta para "${currentItem.name}" é:\n"${currentItem.purpose}"`,
            keywords: currentItem.keywords
          });
        }
      };

      const nextP2Card = () => {
        triggerSound('click');

                        className="py-4 px-6 rounded-xl bg-amber-50 hover:bg-amber-100 border-2 border-amber-200 hover:border-amber-400 text-amber-900 font-bold text-lg shadow-sm transition-all flex flex-col items-center gap-1 active:scale-95"
                      >
                        <i className="fa-solid fa-box-open text-xl text-amber-600"></i>
                        <span>BOX</span>
                        <span className="text-[10px] font-normal text-amber-700">(Apoio ou aprofundamento)</span>
                      </button>
                    </div>
                  ) : (
                    <div className={`p-5 rounded-xl border text-left space-y-3 ${
                      p1Feedback.correct
                        ? 'bg-emerald-50 border-emerald-200 text-emerald-900'
                        : 'bg-rose-50 border-rose-200 text-rose-900'
                    }`}>
                      <div className="flex items-center gap-2 font-bold text-base">
                        <i className={`fa-solid ${p1Feedback.correct ? 'fa-circle-check text-emerald-600' : 'fa-circle-xmark text-rose-600'}`}></i>
                        <span>{p1Feedback.correct ? 'Correto! (+5 pontos)' : 'Atenção Pedagógica (0 pontos)'}</span>
                      </div>
                      <p className="text-sm leading-relaxed">{p1Feedback.message}</p>
                      
                      <div className="pt-2 flex justify-end">
                        <button
                          onClick={nextP1Card}
                          className="bg-eai-navy hover:bg-slate-800 text-white font-bold py-2.5 px-6 rounded-xl shadow text-sm flex items-center gap-2"
                        >
                          <span>{p1Index < p1Deck.length - 1 ? 'Próxima carta' : 'Concluir Fase 1'}</span>
                          <i className="fa-solid fa-arrow-right text-xs"></i>
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* PHASE 2 */}
            {screen === 'phase2' && p2Items.length > 0 && (
              <div className="max-w-2xl mx-auto space-y-6 card-transition py-4">
                <div className="flex items-center justify-between text-xs font-semibold text-slate-500 px-1">
                  <span>FASE 2: ENCONTRE O PROPÓSITO</span>
                  <span>Desafio {p2Index + 1} de {p2Items.length}</span>
                </div>

                <div className="bg-white p-6 sm:p-8 rounded-2xl border border-slate-200 shadow-xl space-y-6">
                  <div className="flex items-center gap-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <div className="w-12 h-12 rounded-xl bg-eai-navy text-white flex items-center justify-center text-2xl font-bold">
                      <i className={`fa-solid ${p2Items[p2Index].icon}`}></i>
                    </div>
                    <div>
                      <span className="text-[10px] font-bold uppercase tracking-wider text-eai-orange">
                        Qual é o principal propósito de:
                      </span>
                      <h2 className="font-display font-bold text-xl sm:text-2xl text-eai-navy">
                        {p2Items[p2Index].name}?
                      </h2>
                    </div>
                  </div>

                  {!p2Answered && (
                    <div className="space-y-3">
                      {p2Options.map((opt, idx) => (
                        <button
                          key={idx}
                          onClick={() => handleP2Answer(opt)}
                          className="w-full text-left p-4 rounded-xl border border-slate-200 hover:border-eai-orange hover:bg-orange-50/40 text-slate-700 font-medium text-sm leading-relaxed transition-all shadow-sm flex items-start gap-3 active:scale-[0.99]"
                        >
                          <span className="w-6 h-6 rounded-full bg-slate-100 text-slate-600 font-bold text-xs flex items-center justify-center flex-shrink-0 mt-0.5">
                            {String.fromCharCode(65 + idx)}
                          </span>
                          <span>{opt}</span>
                        </button>
                      ))}
                    </div>
                  )}

                  {p2Feedback && (
                    <div className={`p-5 rounded-xl border text-left space-y-3 ${
                      p2Feedback.correct
                        ? 'bg-emerald-50 border-emerald-200 text-emerald-900'
                        : 'bg-rose-50 border-rose-200 text-rose-900'
                    }`}>
                      <div className="flex items-center gap-2 font-bold text-base">
                        <i className={`fa-solid ${p2Feedback.correct ? 'fa-circle-check text-emerald-600' : 'fa-circle-xmark text-rose-600'}`}></i>
                        <span>{p2Feedback.correct ? 'Excelente!' : 'Atenção ao Propósito Correto'}</span>
                      </div>
                      
                      <p className="text-sm leading-relaxed whitespace-pre-line">{p2Feedback.message}</p>

                      {p2Feedback.keywords && (
                        <div className="pt-2 border-t border-slate-200/60">
                          <span className="text-xs font-bold block mb-1">Palavras-chave pedagógicas:</span>
                          <div className="flex flex-wrap gap-1.5">
                            {p2Feedback.keywords.map((kw, i) => (
                              <span key={i} className="px-2 py-0.5 rounded bg-white/80 border border-slate-200 text-[11px] font-medium text-slate-700">
                                #{kw}
                              </span>
                            ))}
                          </div>
                        </div>
                      )}

                      <div className="pt-2 flex justify-end">
                        <button
                          onClick={nextP2Card}
                          className="bg-eai-navy hover:bg-slate-800 text-white font-bold py-2.5 px-6 rounded-xl shadow text-sm flex items-center gap-2"
                        >
                          <span>{p2Index < p2Items.length - 1 ? 'Próximo item' : 'Concluir Fase 2'}</span>
                          <i className="fa-solid fa-arrow-right text-xs"></i>
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* PHASE 3 */}
            {screen === 'phase3' && p3Scenarios.length > 0 && (
              <div className="max-w-2xl mx-auto space-y-6 card-transition py-4">
                <div className="flex items-center justify-between text-xs font-semibold text-slate-500 px-1">
                  <span>FASE 3: SALA EM CENA (Situações Práticas)</span>
                  <span>Cenário {p3Index + 1} de {p3Scenarios.length}</span>
                </div>

                <div className="bg-white p-6 sm:p-8 rounded-2xl border border-slate-200 shadow-xl space-y-6">
                  <div className="bg-slate-900 text-white p-6 rounded-xl shadow space-y-2">
                    <span className="text-xs font-bold text-eai-amber uppercase tracking-wider flex items-center gap-1.5">
                      <i className="fa-solid fa-masks-theater"></i> Situação de Formação / Sala de Aula
                    </span>
                    <p className="text-base sm:text-lg font-medium leading-relaxed">
                      “{p3Scenarios[p3Index].text}”
                    </p>
                  </div>

                  <p className="text-xs font-bold text-slate-500 uppercase">
                    Qual Seção ou Box é mais indicado para esta situação?
                  </p>

                  {!p3Answered ? (
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                      {p3Scenarios[p3Index].shuffledOptions.map((opt, idx) => (
                        <button
                          key={idx}
                          onClick={() => handleP3Answer(opt)}
                          className="p-4 rounded-xl border border-slate-200 hover:border-eai-orange hover:bg-orange-50/50 text-slate-800 font-bold text-sm text-left transition-all shadow-sm flex items-center justify-between active:scale-95"
                        >
                          <span>{opt}</span>
                          <i className="fa-solid fa-chevron-right text-xs text-slate-400"></i>
                        </button>
                      ))}
                    </div>
                  ) : (
                    <div className={`p-5 rounded-xl border text-left space-y-3 ${
                      p3Feedback.correct
                        ? 'bg-emerald-50 border-emerald-200 text-emerald-900'
                        : 'bg-rose-50 border-rose-200 text-rose-900'
                    }`}>
                      <div className="flex items-center gap-2 font-bold text-base">
                        <i className={`fa-solid ${p3Feedback.correct ? 'fa-circle-check text-emerald-600' : 'fa-circle-xmark text-rose-600'}`}></i>
                        <span>{p3Feedback.correct ? 'Análise Perfeita!' : 'Atenção à Resposta Correta'}</span>
                      </div>

                      <p className="text-sm leading-relaxed font-medium">{p3Feedback.message}</p>

                      <div className="pt-2 flex justify-end">
                        <button
                          onClick={nextP3Card}
                          className="bg-eai-navy hover:bg-slate-800 text-white font-bold py-2.5 px-6 rounded-xl shadow text-sm flex items-center gap-2"
                        >
                          <span>{p3Index < p3Scenarios.length - 1 ? 'Próximo cenário' : 'Concluir Fase 3'}</span>
                          <i className="fa-solid fa-arrow-right text-xs"></i>
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* PHASE 4 */}
            {screen === 'phase4' && (
              <div className="max-w-2xl mx-auto space-y-6 card-transition py-4">
                <div className="flex items-center justify-between text-xs font-semibold text-slate-500 px-1">
                  <span>FASE 4: RECONSTRUA O PERCURSO</span>
                  <span>Ordenação Didática das Seções</span>
                </div>

                <div className="bg-white p-6 sm:p-8 rounded-2xl border border-slate-200 shadow-xl space-y-6">
                  <div>
                    <h2 className="font-display font-bold text-xl text-eai-navy mb-1">
                      Organize as Seções no Percurso Pedagógico
                    </h2>
                    <p className="text-xs text-slate-600 leading-relaxed">
                      Ordene os cards considerando o movimento didático: 
                      <strong> Introdução → Narrativa → Prática → Reflexão → Aprofundamento → Continuidade</strong>.
                    </p>
                  </div>

                  <div className="space-y-2">
                    {p4Items.map((item, index) => (
                      <div
                        key={item.id}
                        className={`p-3.5 rounded-xl border flex items-center justify-between gap-3 transition-all ${
                          p4Checked && p4IsCorrect
                            ? 'bg-emerald-50/80 border-emerald-300 text-emerald-950'
                            : 'bg-slate-50 border-slate-200 text-slate-800'
                        }`}
                      >
                        <div className="flex items-center gap-3">
                          <span className="w-7 h-7 rounded-lg bg-eai-navy text-white font-bold text-xs flex items-center justify-center flex-shrink-0">
                            {index + 1}
                          </span>
                          <i className={`fa-solid ${item.icon} text-eai-orange text-lg`}></i>
                          <span className="font-bold text-sm">{item.name}</span>
                        </div>

                        {!p4Checked && (
                          <div className="flex items-center gap-1">
                            <button
                              disabled={index === 0}
                              onClick={() => moveP4Item(index, 'up')}
                              className="p-2 rounded-lg bg-white border border-slate-200 hover:bg-slate-100 disabled:opacity-30 disabled:hover:bg-white text-slate-700 text-xs"
                              title="Mover para cima"
                            >
                              <i className="fa-solid fa-arrow-up"></i>
                            </button>
                            <button
                              disabled={index === p4Items.length - 1}
                              onClick={() => moveP4Item(index, 'down')}
                              className="p-2 rounded-lg bg-white border border-slate-200 hover:bg-slate-100 disabled:opacity-30 disabled:hover:bg-white text-slate-700 text-xs"
                              title="Mover para baixo"
                            >
                              <i className="fa-solid fa-arrow-down"></i>
                            </button>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>

                  {!p4Checked ? (
                    <button
                      onClick={checkP4Sequence}
                      className="w-full bg-eai-orange hover:bg-eai-orangeHover text-white font-bold py-3.5 rounded-xl shadow-md transition-all text-sm flex items-center justify-center gap-2"
                    >
                      <i className="fa-solid fa-check-double"></i> Verificar Percurso
                    </button>
                  ) : (
                    <div className="space-y-4">
                      <div className={`p-4 rounded-xl border text-sm leading-relaxed ${
                        p4IsCorrect ? 'bg-emerald-50 border-emerald-200 text-emerald-900' : 'bg-amber-50 border-amber-200 text-amber-900'
                      }`}>
                        <div className="font-bold mb-1 flex items-center gap-2">
                          <i className="fa-solid fa-circle-info"></i> Observação Pedagógica Formativa
                        </div>
                        <p className="mb-2">{p4Feedback.message}</p>
                        <p className="text-xs italic text-slate-600 bg-white/60 p-3 rounded-lg border border-slate-200">
                          “Essa sequência representa uma organização didática possível e coerente para compreender o percurso. Em capítulos concretos, os elementos podem dialogar de maneiras diferentes conforme a intencionalidade pedagógica. O mais importante é reconhecer a função de cada Seção.”
                        </p>
                      </div>

                      <div className="flex justify-end">
                        <button
                          onClick={finishP4}
                          className="bg-eai-navy hover:bg-slate-800 text-white font-bold py-3 px-8 rounded-xl shadow text-sm flex items-center gap-2"
                        >
                          <span>Avançar para a Missão Final</span>
                          <i className="fa-solid fa-arrow-right text-xs"></i>
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* PHASE 5 */}
            {screen === 'phase5' && p5Questions.length > 0 && (
              <div className="max-w-2xl mx-auto space-y-6 card-transition py-4">
                <div className="flex items-center justify-between text-xs font-semibold text-slate-500 px-1">
                  <span>FASE 5: MISSÃO FINAL (Consolidação Rápida)</span>
                  <span>Desafio {p5Index + 1} de {p5Questions.length}</span>
                </div>

                <div className="bg-white p-6 sm:p-8 rounded-2xl border border-slate-200 shadow-xl space-y-6">
                  <div className="bg-eai-navy text-white p-6 rounded-xl shadow space-y-2 text-center">
                    <i className="fa-solid fa-bolt text-eai-amber text-2xl mb-1"></i>
                    <h2 className="font-display font-bold text-xl sm:text-2xl">
                      {p5Questions[p5Index].question}
                    </h2>
                  </div>

                  {!p5Answered ? (
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                      {p5Questions[p5Index].shuffledOptions.map((opt, idx) => (
                        <button
                          key={idx}
                          onClick={() => handleP5Answer(opt)}
                          className="p-4 rounded-xl border border-slate-200 hover:border-eai-orange hover:bg-orange-50/50 text-slate-800 font-bold text-sm text-left transition-all shadow-sm flex items-center justify-between active:scale-95"
                        >
                          <span>{opt}</span>
                          <i className="fa-solid fa-arrow-right text-xs text-slate-400"></i>
                        </button>
                      ))}
                    </div>
                  ) : (
                    <div className={`p-5 rounded-xl border text-left space-y-3 ${
                      p5Feedback.correct
                        ? 'bg-emerald-50 border-emerald-200 text-emerald-900'
                        : 'bg-rose-50 border-rose-200 text-rose-900'
                    }`}>
                      <div className="flex items-center gap-2 font-bold text-base">
                        <i className={`fa-solid ${p5Feedback.correct ? 'fa-circle-check text-emerald-600' : 'fa-circle-xmark text-rose-600'}`}></i>
                        <span>{p5Feedback.correct ? 'Correto!' : 'Atenção'}</span>
                      </div>
                      <p className="text-sm font-medium">{p5Feedback.message}</p>

                      <div className="pt-2 flex justify-end">
                        <button
                          onClick={nextP5Question}
                          className="bg-eai-navy hover:bg-slate-800 text-white font-bold py-2.5 px-6 rounded-xl shadow text-sm flex items-center gap-2"
                        >
                          <span>{p5Index < p5Questions.length - 1 ? 'Próximo desafio' : 'Finalizar Trilha'}</span>
                          <i className="fa-solid fa-flag-checkered text-xs"></i>
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* SCREEN: RESULTADO */}
            {screen === 'result' && (
              <div className="max-w-3xl mx-auto space-y-6 card-transition py-4 text-center">
                <div className="bg-white p-8 rounded-2xl border border-slate-200 shadow-2xl space-y-6 relative overflow-hidden">
                  <div className="inline-flex p-4 rounded-full bg-amber-100 text-eai-amber text-4xl mb-2">
                    <i className="fa-solid fa-award"></i>
                  </div>

                  <div>
                    <span className="text-xs font-bold uppercase tracking-widest text-slate-400 block mb-1">
                      {gameMode === 'team' && teamName ? `Resultado da Equipe: ${teamName}` : 'Resultado do Participante'}
                    </span>

                    <h2 className="font-display font-extrabold text-3xl sm:text-4xl text-eai-navy">
                      {scorePercentage < 60 && 'EXPLORADOR DA TRILHA EAI'}
                      {scorePercentage >= 60 && scorePercentage < 85 && 'MEDIADOR DA TRILHA EAI'}
                      {scorePercentage >= 85 && 'ESPECIALISTA DA TRILHA EAI'}
                    </h2>
                  </div>

                  <div className="grid grid-cols-2 sm:grid-cols-3 gap-4 max-w-lg mx-auto py-2">
                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                      <span className="text-xs font-semibold text-slate-500 block">Pontuação</span>
                      <span className="font-display font-bold text-2xl text-eai-orange">{score}</span>
                    </div>
                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                      <span className="text-xs font-semibold text-slate-500 block">Aproveitamento</span>
                      <span className="font-display font-bold text-2xl text-eai-teal">{scorePercentage}%</span>
                    </div>
                    <div className="col-span-2 sm:col-span-1 bg-slate-50 p-4 rounded-xl border border-slate-200">
                      <span className="text-xs font-semibold text-slate-500 block">Fases Concluídas</span>
                      <span className="font-display font-bold text-2xl text-emerald-600">5 / 5</span>
                    </div>
                  </div>

                  <div className="p-6 rounded-xl bg-orange-50/70 border border-orange-200 text-eai-navy text-sm sm:text-base leading-relaxed font-medium max-w-2xl mx-auto">
                    {scorePercentage < 60 && (
                      <p>
                        “Você iniciou a exploração do percurso pedagógico. Retome os propósitos das Seções e dos Boxes e observe como cada elemento contribui para a experiência de aprendizagem.”
                      </p>
                    )}
                    {scorePercentage >= 60 && scorePercentage < 85 && (
                      <p>
                        “Você já reconhece grande parte dos elementos e de suas funções. Continue relacionando cada proposta à intencionalidade pedagógica.”
                      </p>
                    )}
                    {scorePercentage >= 85 && (
                      <p>
                        “Você demonstrou compreender como as Seções estruturam o percurso e como os Boxes apoiam, ampliam e aprofundam as experiências pedagógicas.”
                      </p>
                    )}
                  </div>

                  <div className="pt-4 flex flex-col sm:flex-row items-center justify-center gap-4">
                    <button
                      onClick={() => { setScreen('review'); triggerSound('click'); }}
                      className="w-full sm:w-auto bg-eai-navy hover:bg-slate-800 text-white font-bold py-3.5 px-6 rounded-xl shadow transition-all text-sm flex items-center justify-center gap-2"
                    >
                      <i className="fa-solid fa-book-open-reader"></i> Conhecer Todas as Seções e Boxes
                    </button>

                    <button
                      onClick={resetAllProgress}
                      className="w-full sm:w-auto bg-white hover:bg-slate-100 text-slate-700 border border-slate-300 font-bold py-3.5 px-6 rounded-xl shadow-sm transition-all text-sm flex items-center justify-center gap-2"
                    >
                      <i className="fa-solid fa-rotate-right"></i> Jogar Novamente
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* SCREEN: REVISÃO */}
            {screen === 'review' && (
              <div className="max-w-5xl mx-auto space-y-6 card-transition py-4">
                <div className="bg-white p-6 sm:p-8 rounded-2xl border border-slate-200 shadow-xl space-y-6">
                  <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-slate-100 pb-4">
                    <div>
                      <h2 className="font-display font-bold text-2xl text-eai-navy">Guia Pedagógico de Referência</h2>
                      <p className="text-xs text-slate-500">Síntese de Seções e Boxes da Metodologia EAI</p>
                    </div>
                    <button
                      onClick={() => { setScreen('result'); triggerSound('click'); }}
                      className="bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-2 px-4 rounded-lg text-xs flex items-center gap-1.5 self-start sm:self-auto"
                    >
                      <i className="fa-solid fa-arrow-left"></i> Voltar ao Resultado
                    </button>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    {/* SEÇÕES */}
                    <div className="space-y-4">
                      <div className="flex items-center gap-2 border-b-2 border-indigo-500 pb-2 text-indigo-900 font-display font-bold text-lg">
                        <i className="fa-solid fa-layer-group text-indigo-600"></i>
                        <span>SEÇÕES (Estruturam o Percurso)</span>
                      </div>

                      <div className="space-y-3">
                        {PEDAGOGY_DATA.sections.map(sec => (
                          <div key={sec.id} className="p-4 rounded-xl bg-indigo-50/40 border border-indigo-100 space-y-2">
                            <div className="flex items-center gap-3">
                              <i className={`fa-solid ${sec.icon} text-indigo-600 text-lg`}></i>
                              <h3 className="font-bold text-sm text-indigo-950">{sec.name}</h3>
                            </div>
                            <p className="text-xs text-slate-600 leading-relaxed">{sec.purpose}</p>
                            <div className="flex flex-wrap gap-1 pt-1">
                              {sec.keywords.map((kw, idx) => (
                                <span key={idx} className="px-2 py-0.5 rounded bg-white border border-indigo-200 text-[10px] text-indigo-800 font-medium">
                                  #{kw}
                                </span>
                              ))}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* BOXES */}
                    <div className="space-y-4">
                      <div className="flex items-center gap-2 border-b-2 border-amber-500 pb-2 text-amber-900 font-display font-bold text-lg">
                        <i className="fa-solid fa-box-open text-amber-600"></i>
                        <span>BOXES (Apoiam e Aprofundam)</span>
                      </div>

                      <div className="space-y-3">
                        {PEDAGOGY_DATA.boxes.map(box => (
                          <div key={box.id} className="p-4 rounded-xl bg-amber-50/40 border border-amber-100 space-y-2">
                            <div className="flex items-center gap-3">
                              <i className={`fa-solid ${box.icon} text-amber-600 text-lg`}></i>
                              <h3 className="font-bold text-sm text-amber-950">{box.name}</h3>
                            </div>
                            <p className="text-xs text-slate-600 leading-relaxed">{box.purpose}</p>
                            <div className="flex flex-wrap gap-1 pt-1">
                              {box.keywords.map((kw, idx) => (
                                <span key={idx} className="px-2 py-0.5 rounded bg-white border border-amber-200 text-[10px] text-amber-800 font-medium">
                                  #{kw}
                                </span>
                              ))}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>

                  <div className="pt-4 border-t border-slate-100 flex justify-center">
                    <button
                      onClick={() => { setScreen('welcome'); triggerSound('click'); }}
                      className="bg-eai-navy hover:bg-slate-800 text-white font-bold py-3 px-8 rounded-xl shadow text-sm flex items-center gap-2"
                    >
                      <i className="fa-solid fa-house"></i> Voltar ao Início
                    </button>
                  </div>
                </div>
              </div>
            )}
          </main>

          <footer className="bg-slate-900 text-slate-400 text-xs py-4 px-4 text-center border-t border-slate-800">
            <div className="max-w-5xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-2">
              <span>TRILHA EAI — Seções e Boxes em Ação</span>
              <span>Formação Continuada de Professores • Instituto Hortense</span>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
